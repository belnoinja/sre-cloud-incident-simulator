name: "cloud-incident-simulator"
description: "SRE infrastructure simulator for AI agent evaluation."
version: "0.1.13"
entrypoint: "server.app:app"

# MANDATORY: This satisfies the 'multi-mode deployment' check
runtime:
  python: "3.11"
  modes:
    - "http" # Traditional REST API for your inference script
    - "mcp"  # Model Context Protocol for direct AI tool integration

action:
  type: "CloudEnvAction"
  module: "models"
observation:
  type: "CloudEnvObservation"
  module: "models"
state:
  type: "CloudEnvState"
  module: "models"

tags:
  - "sre"
  - "openenv"
  - "cloud-computing"